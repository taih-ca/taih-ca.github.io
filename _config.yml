title: TAIH - Transdisciplinary AI Hub
short_title: TAIH
tagline: Bringing AI Researchers Together
description: >-
  The Transdisciplinary Artificial Intelligence Hub (TAIH) is a collaborative
  research initiative dedicated to applying AI expertise across disciplines and
  to industry, advancing transdisciplinary research that addresses complex
  societal and technological challenges.

institution: University of Calgary
email: taih@ucalgary.ca
address: ICT Building, University of Calgary, Calgary, Alberta, Canada T2N 1N4

# Custom domain served via GitHub Pages (see CNAME)
url: https://taih.ca
baseurl: ""

# SEO
logo: /assets/img/taih-mark.png
author: Transdisciplinary AI Hub
lang: en_CA
# Uncomment and paste the token from Google Search Console (HTML tag method), then redeploy
# google_site_verification: "PASTE_TOKEN_HERE"

defaults:
  - scope: { path: "" }
    values:
      image: /assets/img/og-image.png

# External links
links:
  website: https://wpsites.ucalgary.ca/transdisciplinary-ai-hub/
  ucalgary_ai: https://ai.ucalgary.ca/
  symposium: https://www.eventbrite.com/e/2026-transdisciplinary-ai-hub-taih-annual-symposium-tickets-1986037603936

# Navigation (in-page anchors + external)
nav:
  - { name: About, url: "/#about" }
  - { name: Members, url: "/members/" }
  - { name: News, url: "/#news" }
  - { name: Contact, url: "/#contact" }

# Jekyll
markdown: kramdown
permalink: pretty
sass:
  style: compressed

collections:
  news:
    output: true
    permalink: /news/:name/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - logos
  - vendor
  - .idea
  - CLAUDE.md
  - .DS_Store
