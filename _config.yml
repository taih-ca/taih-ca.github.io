title: Transdisciplinary AI Hub
short_title: TAIH
tagline: Bringing AI Researchers Together
description: >-
  The Transdisciplinary Artificial Intelligence Hub (TAIH) is a collaborative
  research initiative dedicated to applying AI expertise across disciplines and
  to industry, advancing transdisciplinary research that addresses complex
  societal and technological challenges.

institution: University of Calgary
email: taih@ucalgary.ca
address: ICT Building, University of Calgary, Calgary, Alberta, Canada T2N 1N4

# Built for GitHub Pages (https://taih-ca.github.io)
url: https://taih-ca.github.io
baseurl: ""

# External links
links:
  website: https://wpsites.ucalgary.ca/transdisciplinary-ai-hub/
  ucalgary_ai: https://ai.ucalgary.ca/
  symposium: https://www.eventbrite.com/e/2026-transdisciplinary-ai-hub-taih-annual-symposium-tickets-1986037603936

