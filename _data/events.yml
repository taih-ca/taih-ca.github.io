# Recurring activities of the Hub
- title: Reading Group
  format: Online
  description: >-
    Critical engagement with current AI literature — discussing foundational
    papers and emerging work across disciplines.

- title: Symposiums & Talks
  format: University of Calgary
  description: >-
    Showcasing research and real-world applications from members and invited
    speakers across the AI community.

- title: Weekly Workshop
  format: Hybrid
  description: >-
    Hands-on sessions for building practical AI skills, from tooling and
    methods to reproducible research workflows.

- title: Hackathons
  format: Hybrid
  description: >-
    Collaborative, time-boxed problem-solving sprints tackling real-world
    challenges with transdisciplinary teams.
