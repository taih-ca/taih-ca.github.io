---
layout: default
---
<section class="page-hero">
  <div class="page-hero__bg" aria-hidden="true">
    <span class="shard shard--tan"></span>
    <span class="shard shard--orange"></span>
  </div>
  <div class="container">
    <p class="hero__eyebrow">News</p>
    <h1 class="page-hero__title">{{ page.title }}</h1>
    <p class="news-article__meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.author %} · by {{ page.author }}{% endif %}</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <article class="news-article">
      {{ content }}
      {% if page.cta_link %}
      <p class="news-article__cta"><a class="btn btn--primary" href="{{ page.cta_link }}" target="_blank" rel="noopener">{{ page.cta_text | default: "Learn more" }} ↗</a></p>
      {% endif %}
    </article>
    <p class="news-back"><a href="{{ '/news/' | relative_url }}">← All news</a></p>
  </div>
</section>
